
<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snake Bomb Game</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
#wrap{text-align:center}canvas{background:#222;border:4px solid #0f0}button{padding:8px 16px}
</style></head><body><div id="wrap">
<h2>Score: <span id="score">0</span> High: <span id="high">0</span></h2>
<canvas id="c" width="400" height="400"></canvas><br><button onclick="restart()">Restart</button>
<p>Arrow keys to move. Food=🍎 Grow, Bomb=💣 Game Over</p>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d'),g=20,n=20;
let s,d,f,b,sc,t,spd=120;
let hi=+localStorage.snakeHigh||0;high.textContent=hi;
function rnd(){return {x:Math.floor(Math.random()*n),y:Math.floor(Math.random()*n)}}
function place(){
 do{f=rnd()}while(s.some(p=>p.x==f.x&&p.y==f.y));
 do{b=rnd()}while(s.some(p=>p.x==b.x&&p.y==b.y)|| (b.x==f.x&&b.y==f.y));
}
function restart(){
 s=[{x:10,y:10}];d={x:1,y:0};sc=0;score.textContent=0;spd=120;place();
 clearInterval(t);t=setInterval(loop,spd);
}
onkeydown=e=>{
 if(e.key=="ArrowUp"&&d.y!=1)d={x:0,y:-1};
 if(e.key=="ArrowDown"&&d.y!=-1)d={x:0,y:1};
 if(e.key=="ArrowLeft"&&d.x!=1)d={x:-1,y:0};
 if(e.key=="ArrowRight"&&d.x!=-1)d={x:1,y:0};
}
function loop(){
 let h={x:s[0].x+d.x,y:s[0].y+d.y};
 if(h.x<0||h.y<0||h.x>=n||h.y>=n||s.some(p=>p.x==h.x&&p.y==h.y)|| (h.x==b.x&&h.y==b.y)){
  clearInterval(t);if(sc>hi){hi=sc;localStorage.snakeHigh=hi;high.textContent=hi;}
  alert("Game Over! Score: "+sc);return;
 }
 s.unshift(h);
 if(h.x==f.x&&h.y==f.y){sc++;score.textContent=sc;place();if(sc%5==0){spd=Math.max(50,spd-10);clearInterval(t);t=setInterval(loop,spd);}}
 else s.pop();
 x.fillStyle="#222";x.fillRect(0,0,400,400);
 x.fillStyle="red";x.beginPath();x.arc(f.x*g+10,f.y*g+10,8,0,7);x.fill();
 x.fillStyle="orange";x.beginPath();x.arc(b.x*g+10,b.y*g+10,8,0,7);x.fill();
 s.forEach((p,i)=>{x.fillStyle=i?"#0a0":"#0f0";x.fillRect(p.x*g,p.y*g,19,19);});
}
restart();
</script></body></html>
