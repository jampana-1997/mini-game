<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Bomb Game</title>

<style>
body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:#fff;
overflow:hidden;
touch-action:none;
}

#game{
text-align:center;
}

canvas{
background:#222;
border:4px solid lime;
touch-action:none;
user-select:none;
-webkit-user-select:none;
}

button{
padding:10px 20px;
font-size:18px;
margin-top:10px;
cursor:pointer;
}
  #controls{
display:none;
margin-top:15px;
}

#controls button{
width:70px;
height:70px;
margin:5px;
font-size:30px;
border:none;
border-radius:12px;
background:#00c853;
color:white;
}

@media(max-width:768px){

canvas{
width:95vw;
height:95vw;
max-width:400px;
max-height:400px;
}

#controls{
display:block;
}

}
</style>
</head>

<body>

<div id="game">

<h2>Score : <span id="score">0</span></h2>

<h3>High Score : <span id="high">0</span></h3>

<canvas id="canvas" width="400" height="400"></canvas>

<br>

<button onclick="restart()">Restart</button>

<div id="controls">
    <button id="up">⬆</button>

    <div>
        <button id="left">⬅</button>
        <button id="down">⬇</button>
        <button id="right">➡</button>
    </div>
</div>

</div>
<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const size=20;
const cells=20;

let snake;
let food;
let bomb;
let dx;
let dy;
let score;
let timer;

let high=Number(localStorage.getItem("snakeHigh"))||0;
document.getElementById("high").innerText=high;

function randomPos(){

return{

x:Math.floor(Math.random()*cells),

y:Math.floor(Math.random()*cells)

};

}

function placeItems(){

do{
    food = randomPos();
}while(
    snake &&
    snake.some(s => s.x === food.x && s.y === food.y)
);

do{
    bomb = randomPos();
}while(
    (snake && snake.some(s => s.x === bomb.x && s.y === bomb.y)) ||
    (bomb.x === food.x && bomb.y === food.y)
);

}

function restart(){

snake=[

{x:10,y:10}

];

dx=1;
dy=0;

score=0;

document.getElementById("score").innerText=0;

placeItems();

clearInterval(timer);

timer=setInterval(update,180);

}

document.addEventListener("keydown",e=>{

if(e.key=="ArrowUp" && dy!=1){

dx=0;
dy=-1;

}

if(e.key=="ArrowDown" && dy!=-1){

dx=0;
dy=1;

}

if(e.key=="ArrowLeft" && dx!=1){

dx=-1;
dy=0;

}

if(e.key=="ArrowRight" && dx!=-1){

dx=1;
dy=0;

}

});

function update(){

let head={

x:snake[0].x+dx,

y:snake[0].y+dy

};

if(

head.x<0||

head.y<0||

head.x>=cells||

head.y>=cells

){

gameOver();

return;

}

for(let s of snake){

if(head.x==s.x && head.y==s.y){

gameOver();

return;

}

}

if(head.x==bomb.x && head.y==bomb.y){

gameOver();

return;

}

snake.unshift(head);

if(head.x==food.x && head.y==food.y){

score++;

document.getElementById("score").innerText=score;

if(score>high){

high=score;

localStorage.setItem("snakeHigh",high);

document.getElementById("high").innerText=high;

}

placeItems();

}else{

snake.pop();

}

draw();

}

function draw(){

ctx.fillStyle="#222";
ctx.fillRect(0,0,400,400);

ctx.fillStyle="red";

ctx.beginPath();

ctx.arc(

food.x*size+10,

food.y*size+10,

8,

0,

Math.PI*2

);

ctx.fill();

ctx.fillStyle="orange";

ctx.beginPath();

ctx.arc(

bomb.x*size+10,

bomb.y*size+10,

8,

0,

Math.PI*2

);

ctx.fill();

snake.forEach((p,i)=>{

ctx.fillStyle=i==0?"lime":"green";

ctx.fillRect(

p.x*size,

p.y*size,

19,

19

);

});

}

function gameOver(){

clearInterval(timer);

alert("💀 Game Over\nScore : "+score);

}
  let startX=0;
let startY=0;

canvas.addEventListener("touchstart",e=>{
e.preventDefault();

startX=e.touches[0].clientX;
startY=e.touches[0].clientY;

});

canvas.addEventListener("touchend",e=>{
e.preventDefault();

let endX=e.changedTouches[0].clientX;
let endY=e.changedTouches[0].clientY;

let x=endX-startX;
let y=endY-startY;

if(Math.abs(x)>Math.abs(y)){

if(x>30 && dx!=-1){

dx=1;
dy=0;

}

if(x<-30 && dx!=1){

dx=-1;
dy=0;

}

}else{

if(y>30 && dy!=-1){

dx=0;
dy=1;

}

if(y<-30 && dy!=1){

dx=0;
dy=-1;

}

}

});
document.getElementById("up").onclick=()=>{

if(dy!=1){

dx=0;
dy=-1;

}

}

document.getElementById("down").onclick=()=>{

if(dy!=-1){

dx=0;
dy=1;

}

}

document.getElementById("left").onclick=()=>{

if(dx!=1){

dx=-1;
dy=0;

}

}

document.getElementById("right").onclick=()=>{

if(dx!=-1){

dx=1;
dy=0;

}

}
restart();

</script>

</body>
</html>
